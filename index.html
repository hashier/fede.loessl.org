<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transmission from Rocky</title>
    <meta name="description" content="A transmission from Rocky">
    <meta property="og:title" content="Transmission from Rocky">
    <meta property="og:description" content="An important message has been received.">
    <meta name="robots" content="noindex">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #0d0d35 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* --- Stars --- */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: drift linear infinite;
        }

        @keyframes drift {
            from { transform: translateY(0); opacity: 0.8; }
            50% { opacity: 0.3; }
            to { transform: translateY(30px); opacity: 0.8; }
        }

        /* --- Transmission container --- */
        .transmission {
            position: relative;
            z-index: 1;
            max-width: 600px;
            width: 90%;
            padding: 32px 24px;
            font-family: 'Courier New', Courier, monospace;
            color: #00ff88;
            line-height: 1.6;
            font-size: 16px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.4);
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .transmission .header {
            font-size: 11px;
            color: rgba(0, 255, 136, 0.5);
            margin-bottom: 16px;
            line-height: 1.8;
            text-shadow: none;
        }

        .transmission .body {
            white-space: pre-wrap;
            min-height: 200px;
            transition: opacity 0.15s;
        }

        .transmission .ps {
            font-size: 12px;
            color: rgba(0, 255, 136, 0.55);
            text-shadow: none;
        }

        .prompt {
            text-align: center;
            font-size: 12px;
            color: rgba(0, 255, 136, 0.4);
            margin-top: 40px;
            letter-spacing: 1px;
            animation: pulse 2s ease-in-out infinite;
            text-shadow: none;
        }

        .prompt.hidden {
            visibility: hidden;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* --- Shooting star --- */
        .shooting-star {
            position: fixed;
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0.8), transparent);
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            animation: shoot 0.8s linear forwards;
        }

        @keyframes shoot {
            0% { opacity: 0; transform: translateX(0) scaleX(0.3); }
            10% { opacity: 1; }
            70% { opacity: 0.6; }
            100% { opacity: 0; transform: translateX(200px) scaleX(1); }
        }

        /* --- Planet --- */
        .planet {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            border-radius: 50%;
        }

        .planet-large {
            bottom: -40px;
            right: -15px;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle at 30% 30%, #3b3b8e 0%, #222266 40%, #0e0e3a 100%);
            box-shadow: -8px -6px 40px rgba(120, 150, 255, 0.25), inset -20px -10px 40px rgba(0, 0, 0, 0.3);
            opacity: 0.7;
        }

        .planet-ring {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            bottom: 78px;
            right: -40px;
            width: 340px;
            height: 38px;
            border: 1.5px solid rgba(150, 170, 255, 0.3);
            border-radius: 50%;
            transform: rotate(-15deg);
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            .planet-large {
                width: 150px;
                height: 150px;
                bottom: -30px;
                right: -10px;
            }
            .planet-ring {
                bottom: 30px;
                right: -30px;
                width: 200px;
                height: 22px;
            }
            .spaceship-orbit {
                bottom: 45px;
                right: 65px;
            }
            @keyframes orbit-planet {
                from { transform: rotate(0deg) translateX(80px) rotate(0deg); }
                to { transform: rotate(360deg) translateX(80px) rotate(-360deg); }
            }
        }

        .planet-small {
            top: 12%;
            left: 8%;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle at 40% 40%, #aa9988, #665544);
            opacity: 0.6;
            animation: orbit-small 120s linear infinite;
        }

        @keyframes orbit-small {
            from { transform: rotate(0deg) translateX(3px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(3px) rotate(-360deg); }
        }

        /* --- Spaceship orbiting planet --- */
        .spaceship-orbit {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            bottom: 70px;
            right: 90px;
            width: 0;
            height: 0;
            animation: orbit-planet 8s linear infinite;
        }

        .spaceship {
            width: 6px;
            height: 3px;
            background: #ccd;
            border-radius: 50%;
            box-shadow: 0 0 4px rgba(200, 210, 255, 0.6), -4px 0 3px rgba(255, 150, 50, 0.4);
            position: absolute;
            top: -1.5px;
            left: -3px;
        }

        @keyframes orbit-planet {
            from { transform: rotate(0deg) translateX(120px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(120px) rotate(-360deg); }
        }

        /* --- Star (sun) --- */
        .sun {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            top: -30px;
            left: -30px;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 50% 50%, rgba(255, 240, 200, 0.3) 0%, rgba(255, 200, 100, 0.1) 40%, transparent 70%);
            border-radius: 50%;
        }

        .sun-core {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            top: -8px;
            left: -8px;
            width: 24px;
            height: 24px;
            background: radial-gradient(circle, rgba(255, 240, 200, 0.7) 0%, rgba(255, 220, 150, 0.3) 50%, transparent 100%);
            border-radius: 50%;
            animation: sun-pulse 4s ease-in-out infinite;
        }

        @keyframes sun-pulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="sun"></div>
    <div class="sun-core"></div>
    <div class="planet planet-large"></div>
    <div class="planet-ring"></div>
    <div class="spaceship-orbit"><div class="spaceship"></div></div>
    <div class="planet planet-small"></div>
    <div class="transmission">
        <div class="body" id="content"></div>
        <div class="prompt hidden" id="prompt">[ RECEIVE NEXT TRANSMISSION ]</div>
    </div>
    <script>
        // --- Stars ---
        (function initStars() {
            const container = document.getElementById('stars');
            const count = 80;
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.opacity = Math.random() * 0.6 + 0.2;
                star.style.animationDuration = (Math.random() * 6 + 4) + 's';
                star.style.animationDelay = (Math.random() * -10) + 's';
                if (Math.random() > 0.7) {
                    star.style.width = '3px';
                    star.style.height = '3px';
                }
                container.appendChild(star);
            }
        })();

        // --- Shooting star ---
        (function initShootingStar() {
            function spawnShootingStar() {
                const star = document.createElement('div');
                star.className = 'shooting-star';
                star.style.top = (Math.random() * 50 + 5) + '%';
                star.style.left = (Math.random() * 60 + 10) + '%';
                star.style.transform = 'rotate(' + (Math.random() * 30 + 15) + 'deg)';
                document.body.appendChild(star);
                setTimeout(function() { star.remove(); }, 1000);
            }
            // First one after 30-90s, then every 45-90s
            setTimeout(function fire() {
                spawnShootingStar();
                setTimeout(fire, (Math.random() * 45000 + 45000));
            }, (Math.random() * 60000 + 30000));
        })();

        // --- Sound ---
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    // Web Audio not available — page works silently
                }
            }
        }

        // Chord definitions — ascending root notes, each is an array of frequencies
        const chords = [
            [196.0, 246.9, 293.7],          // G3 major — opening
            [220.0, 277.2, 329.6],          // A3 major
            [233.1, 293.7, 349.2],          // Bb3 major
            [246.9, 311.1, 370.0],          // B3 major
            [261.6, 329.6, 392.0],          // C4 major
            [293.7, 370.0, 440.0],          // D4 major — the realization
            [329.6, 415.3, 493.9],          // E4 major — the landing
            [392.0, 493.9, 587.3, 784.0],   // G4 major + octave — amaze (fuller)
        ];

        function playChord(index) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const freqs = chords[index] || chords[0];
            const isFinal = index === chords.length - 1;
            const now = audioCtx.currentTime;
            const duration = isFinal ? 2.5 : 1.2;

            freqs.forEach(function(freq, i) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                // Mix triangle and sine for warmth
                osc.type = i === 0 ? 'triangle' : 'sine';
                osc.frequency.value = freq;

                // Gentle envelope
                const volume = isFinal ? 0.08 : 0.06;
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(volume, now + 0.08);
                gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + duration);
            });
        }

        // --- Script ---
        const steps = [
            {
                header: '▸ ERIDIAN TRANSMISSION DETECTED\n▸ SOURCE: ROCKY\n▸ FREQUENCY: ♫♫♫\n▸ DECRYPTING...',
                body: 'I have question.\nVery important question.\n\nWhat is... love?'
            },
            {
                body: 'I ask friend. Friend no help. Friend just smile.\n\nSo I make hypothesis.\n\nHypothesis 1:\nLove = when human make food for other human.\n\nVery specific human. Italian human.\nFood is... very good. Friend eat too much. Every time.\n\nBut no. This is not love.\nThis is just... pasta.'
            },
            {
                body: 'Hypothesis 2:\nLove = when human bite other human.\n\nThis make no sense. On Erid, bite = danger.\nBut this human call it "love bite."\n\nI check data. Friend not injured. Friend... happy?\n\nHumans are very confusing species.'
            },
            {
                body: 'Hypothesis 3:\nLove = when human share one big blanket\neven though other human want two normal blanket.\n\nTwo blanket is logical. Efficient. Good engineering.\nOne blanket is... chaos.\n\nBut she insist. One blanket. Together.\nAnd he stay under the one blanket.\n\nEvery night.\n\n...interesting.'
            },
            {
                body: 'New data.\n\nI observe: friend think about one specific human\n847 times per day.\n\nI count. I am very good at counting.\n\nThis seem... inefficient.\nBut friend say no. Friend say this is best part of day.\n\nAll 847 times.'
            },
            {
                body: 'I analyze all data. Run all models.\n\nLove is not pasta. Not bite. Not blanket.\n\nLove is when entire universe is very big\nand very cold and very dark\n\nbut you find one person\nand suddenly...\n\nnot so cold.'
            },
            {
                body: 'So.\n\nFederica.\n\nI check my friend\'s data one more time.\nI look at all the evidence.\n\nConclusion:\n\nLove = Federica.\n\nThis is not hypothesis. This is fact.\nPeer reviewed. By me. Rocky. Very good scientist.'
            },
            {
                body: 'Amaze amaze amaze. ♫♫♫\n\nEnd transmission.',
                ps: 'P.S. — He love you very much.\nEven when you bite him.\n\nEspecially when you bite him.\n\nHumans. So strange. So good.'
            }
        ];

        // --- Navigation ---
        let currentStep = -1;
        const contentEl = document.getElementById('content');
        const promptEl = document.getElementById('prompt');

        // --- Typewriter ---
        let isAnimating = false;
        let animationTimer = null;

        function typewrite(element, html, callback) {
            isAnimating = true;
            let i = 0;
            element.innerHTML = '';

            function tick() {
                if (i >= html.length) {
                    isAnimating = false;
                    if (callback) callback();
                    return;
                }
                // If we hit a '<', skip ahead to '>' (render full tag at once)
                if (html[i] === '<') {
                    const closeIndex = html.indexOf('>', i);
                    if (closeIndex !== -1) {
                        i = closeIndex + 1;
                        element.innerHTML = html.substring(0, i);
                        animationTimer = setTimeout(tick, 0);
                        return;
                    }
                }
                i++;
                element.innerHTML = html.substring(0, i);
                // Pause longer after line breaks
                const justRendered = html.substring(Math.max(0, i - 4), i);
                const delay = justRendered.endsWith('<br>') ? 120 : 35;
                animationTimer = setTimeout(tick, delay);
            }

            tick();
        }

        function skipAnimation() {
            if (animationTimer) {
                clearTimeout(animationTimer);
                animationTimer = null;
            }
            isAnimating = false;
        }

        function buildHtml(step) {
            let html = '';
            if (step.header) {
                html += '<div class="header">' + step.header.replace(/\n/g, '<br>') + '</div>';
            }
            html += step.body.replace(/\n/g, '<br>');
            if (step.ps) {
                html += '<br><br><div class="ps">' + step.ps.replace(/\n/g, '<br>') + '</div>';
            }
            return html;
        }

        function showStep(index) {
            const html = buildHtml(steps[index]);
            promptEl.classList.add('hidden');
            contentEl.style.opacity = '0';
            setTimeout(function() {
                contentEl.style.opacity = '1';
                typewrite(contentEl, html, function() {
                    if (index < steps.length - 1) {
                        promptEl.classList.remove('hidden');
                    }
                });
            }, 150);
        }

        function advance() {
            initAudio();
            if (isAnimating) {
                // Skip to end of current animation
                skipAnimation();
                contentEl.innerHTML = buildHtml(steps[currentStep]);
                if (currentStep < steps.length - 1) {
                    promptEl.classList.remove('hidden');
                }
                return;
            }
            if (currentStep < steps.length - 1) {
                currentStep++;
                playChord(currentStep);
                showStep(currentStep);
            }
        }

        document.body.addEventListener('click', advance);
        document.body.addEventListener('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Enter' || e.key === 'ArrowRight') {
                e.preventDefault();
                advance();
            }
        });

        // Show first step
        advance();
    </script>
</body>
</html>
